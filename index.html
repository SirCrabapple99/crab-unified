<html>

<head>
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>
        eruda.init();
    </script>
    <link
        href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="fonts.css">
    <link rel="stylesheet" href="everything.css">
</head>

<body>
    <div id="backgroundHolder">
    </div>
    <!-- site top bar -->
    <div id="topbar">
        <div id="searchBar">
            <input id="searchInput" class="ubuntu-medium" type="text" autocomplete="off"
                placeholder="Search Repositories..."></input>
        </div>

        <!-- div wrapper on icons is so that margin and stuff doesn't get screwed up -->
        <div class="iconFix" style="margin-right: auto; margin-left: 0.4vmin">
            <svg id="plusIcon" onclick="openRepoMenu()" xmlns="http://www.w3.org/2000/svg" width="auto" height="80%"
                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round" class="lucide lucide-circle-plus-icon lucide-circle-plus">
                <circle cx="12" cy="12" r="10" />
                <path d="M8 12h8" />
                <path d="M12 8v8" />
            </svg>
        </div>

        <div class="iconFix" style="margin-right: -0.4vmin">
            <svg id="questionIcon" xmlns="http://www.w3.org/2000/svg" width="auto" height="80%" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                class="lucide lucide-circle-question-mark-icon lucide-circle-question-mark">
                <circle cx="12" cy="12" r="10" />
                <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" />
                <path d="M12 17h.01" />
            </svg>
        </div>

        <div class="iconFix">
            <svg id="settingsIcon" onclick="openSettingsMenu();" xmlns="http://www.w3.org/2000/svg" width="auto"
                height="80%" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-cog-icon lucide-cog">
                <path d="M11 10.27 7 3.34" />
                <path d="m11 13.73-4 6.93" />
                <path d="M12 22v-2" />
                <path d="M12 2v2" />
                <path d="M14 12h8" />
                <path d="m17 20.66-1-1.73" />
                <path d="m17 3.34-1 1.73" />
                <path d="M2 12h2" />
                <path d="m20.66 17-1.73-1" />
                <path d="m20.66 7-1.73 1" />
                <path d="m3.34 17 1.73-1" />
                <path d="m3.34 7 1.73 1" />
                <circle cx="12" cy="12" r="2" />
                <circle cx="12" cy="12" r="8" />
            </svg>
        </div>
    </div>

    <div id="grid">
        <div class="game" onclick="openGamesMenu();" onmousemove="mouseEffect(event)"
            onmouseleave="event.currentTarget.querySelector('.gameImage').style.transform = 'perspective(1000px) rotateX(0deg) rotateY(0deg)';">
            <div class="gameImage">
                <div class="gameLabel  ubuntu-medium">Fish Games</div>
            </div>
        </div>
        <div class="game" onclick="openGamesMenu();" onmousemove="mouseEffect(event)"
            onmouseleave="event.currentTarget.querySelector('.gameImage').style.transform = 'perspective(1000px) rotateX(0deg) rotateY(0deg)';">
            <div class="gameImage">
                <div class="gameLabel  ubuntu-medium">Fish Games</div>
            </div>
        </div>
        <div class="game" onclick="openGamesMenu();" onmousemove="mouseEffect(event)"
            onmouseleave="event.currentTarget.querySelector('.gameImage').style.transform = 'perspective(1000px) rotateX(0deg) rotateY(0deg)';">
            <div class="gameImage">
                <div class="gameLabel  ubuntu-medium">Fish Games</div>
            </div>
        </div>
        <div class="game" onclick="openGamesMenu();" onmousemove="mouseEffect(event)"
            onmouseleave="event.currentTarget.querySelector('.gameImage').style.transform = 'perspective(1000px) rotateX(0deg) rotateY(0deg)';">
            <div class="gameImage">
                <div class="gameLabel  ubuntu-medium">Fish Games</div>
            </div>
        </div>
        <div class="game" onclick="openGamesMenu();" onmousemove="mouseEffect(event)"
            onmouseleave="event.currentTarget.querySelector('.gameImage').style.transform = 'perspective(1000px) rotateX(0deg) rotateY(0deg)';">
            <div class="gameImage">
                <div class="gameLabel  ubuntu-medium">Fish Games</div>
            </div>
        </div>
        <div class="game" onclick="openGamesMenu();" onmousemove="mouseEffect(event)"
            onmouseleave="event.currentTarget.querySelector('.gameImage').style.transform = 'perspective(1000px) rotateX(0deg) rotateY(0deg)';">
            <div class="gameImage">
                <div class="gameLabel  ubuntu-medium">Fish Games</div>
            </div>
        </div>
    </div>

    <!-- popup menus -->
    <div id="repoMenu">
        <div id="repoLeftPanel">
            <div id="repoUrl">
                <input type="text" placeholder="repo url..." id="repoUrlInput" class="ubuntu-medium">
            </div>
            <div id="repoType">
                <div id="repoTypeJson" onclick="selectRepoType(event)" class="repoTypeButton ubuntu-medium selected">
                    JSON</div>
                <div id="repoTypePlaceholder" onclick="selectRepoType(event)" class="repoTypeButton ubuntu-medium">
                    Website</div>
                <div id="repoTypePlaceholder" onclick="selectRepoType(event)" class="repoTypeButton ubuntu-medium">Auto
                </div>
            </div>
        </div>
        <div id="repoRightPanel">
            <div class="iconFix">
                <svg id="repoExitIcon" onclick="closeRepoMenu()" xmlns="http://www.w3.org/2000/svg" width="auto"
                    height="8vmin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-x-icon lucide-x">
                    <path d="M18 6 6 18" />
                    <path d="m6 6 12 12" />
                </svg>
            </div>
        </div>
    </div>

    <div id="settingsMenu">

    </div>

    <div id="gamePopup">
        <iframe id="gameFrame"></iframe>
        <div id="gameToolbar">
            <div id="gameInfo" onclick="openGameInfo()">
                <div id="gameName" class="ubuntu-medium">Game Name Really Long Title</div>
            </div>
            <div class="iconFix">
                <svg id="gameFullscreenIcon" xmlns="http://www.w3.org/2000/svg" width="auto" height="70%"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round" class="lucide lucide-maximize-icon lucide-maximize">
                    <path d="M8 3H5a2 2 0 0 0-2 2v3" />
                    <path d="M21 8V5a2 2 0 0 0-2-2h-3" />
                    <path d="M3 16v3a2 2 0 0 0 2 2h3" />
                    <path d="M16 21h3a2 2 0 0 0 2-2v-3" />
                </svg>
            </div>
            <div class="iconFix">
                <svg id="gameDownloadIcon" xmlns="http://www.w3.org/2000/svg" width="auto" height="70%"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round" class="lucide lucide-download-icon lucide-download">
                    <path d="M12 15V3" />
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                    <path d="m7 10 5 5 5-5" />
                </svg>
            </div>
            <div class="iconFix">
                <svg id="gameExitIcon" onclick="closeGamesMenu()" xmlns="http://www.w3.org/2000/svg" width="auto"
                    height="80%" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-x-icon lucide-x">
                    <path d="M18 6 6 18" />
                    <path d="m6 6 12 12" />
                </svg>
            </div>
        </div>
    </div>
    <script>window.onload = () => {

        }</script>
    <script src="frame.js"></script>
    <script src="repo.js"></script>
</body>

</html>
