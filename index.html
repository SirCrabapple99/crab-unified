<html>

<head>
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>
        eruda.init();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="frame.css">
    <link rel="stylesheet" href="fonts.css">
</head>

<body>
    <div id="backgroundHolder">
    </div>
    <!-- site top bar -->
    <div id="topbar">
        <div id="searchBar">
            <input id="searchInput" class="ubuntu-medium" type="text" autocomplete="off"
                placeholder="Search Repositories..."></input>
        </div>

        <!-- div wrapper on icons is so that margin and stuff doesn't get screwed up -->
        <div class="iconFix" style="margin-right: -0.25vmin">
            <svg id="questionIcon" xmlns="http://www.w3.org/2000/svg" width="auto" height="80%" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                class="lucide lucide-circle-question-mark-icon lucide-circle-question-mark">
                <circle cx="12" cy="12" r="10" />
                <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" />
                <path d="M12 17h.01" />
            </svg>
        </div>

        <div class="iconFix">
            <svg id="settingsIcon" onclick="toggleSettingsMenu();" xmlns="http://www.w3.org/2000/svg" width="auto"
                height="80%" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-cog-icon lucide-cog">
                <path d="M11 10.27 7 3.34" />
                <path d="m11 13.73-4 6.93" />
                <path d="M12 22v-2" />
                <path d="M12 2v2" />
                <path d="M14 12h8" />
                <path d="m17 20.66-1-1.73" />
                <path d="m17 3.34-1 1.73" />
                <path d="M2 12h2" />
                <path d="m20.66 17-1.73-1" />
                <path d="m20.66 7-1.73 1" />
                <path d="m3.34 17 1.73-1" />
                <path d="m3.34 7 1.73 1" />
                <circle cx="12" cy="12" r="2" />
                <circle cx="12" cy="12" r="8" />
            </svg>
        </div>
    </div>

    <div id="grid">
        <div class="game">
            <div class="gameImage">
                <div class="gameLabel  ubuntu-medium">Fish Games</div>
            </div>
        </div>
        <div class="game">
            <div class="gameImage">
                <div class="gameLabel  ubuntu-medium">Fish Games</div>
            </div>
        </div>
        <div class="game">
            <div class="gameImage">
                <div class="gameLabel  ubuntu-medium">Fish Games</div>
            </div>
        </div>
        <div class="game">
            <div class="gameImage">
                <div class="gameLabel  ubuntu-medium">Fish Games</div>
            </div>
        </div>
        <div class="game">
            <div class="gameImage">
                <div class="gameLabel  ubuntu-medium">Fish Games</div>
            </div>
        </div>
        <div class="game">
            <div class="gameImage">
                <div class="gameLabel  ubuntu-medium">Fish Games</div>
            </div>
        </div>
    </div>

    <!-- popup menus -->
    <div id="settingsMenu">

    </div>

    <div id="gamePopup">

    </div>

    <script>window.onload = () => {

            document.getElementById("gamePopup").style.opacity = "1";
        }</script>
    <script src="frame.js"></script>
</body>

</html>
